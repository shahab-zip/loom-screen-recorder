<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="popup">

    <!-- Header -->
    <header class="header">
      <div class="logo">
        <div class="logo-dot"></div>
        <span>Recorder</span>
      </div>
      <button class="link-btn" id="openAppBtn">Open app</button>
    </header>

    <!-- ── IDLE ── -->
    <div id="idle-view">

      <!-- Mode selector -->
      <div class="modes">
        <button class="mode active" data-mode="screen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        </button>
        <button class="mode" data-mode="screen-camera">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15.2 10.7l4-2.2a.8.8 0 011.3.7v5.6a.8.8 0 01-1.3.7l-4-2.2"/><rect x="3" y="6.5" width="12.5" height="11" rx="2"/></svg>
        </button>
        <button class="mode" data-mode="screenshot">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
        </button>
      </div>

      <!-- Devices -->
      <div class="devices">
        <div class="device" id="cameraRow">
          <svg class="device-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15.2 10.7l4-2.2a.8.8 0 011.3.7v5.6a.8.8 0 01-1.3.7l-4-2.2"/><rect x="3" y="6.5" width="12.5" height="11" rx="2"/></svg>
          <select id="cameraSelect" class="device-sel"><option value="">No Camera</option></select>
          <label class="sw"><input type="checkbox" id="cameraToggle"><span class="sw-track"></span></label>
        </div>
        <div class="device">
          <svg class="device-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          <select id="micSelect" class="device-sel"><option value="">No Microphone</option></select>
          <label class="sw"><input type="checkbox" id="micToggle" checked><span class="sw-track"></span></label>
        </div>
      </div>

      <!-- Options -->
      <div class="opts">
        <div class="opt">
          <span class="opt-label">HD</span>
          <label class="sw sm"><input type="checkbox" id="hdToggle" checked><span class="sw-track"></span></label>
        </div>
        <div class="opt">
          <span class="opt-label">Countdown</span>
          <label class="sw sm"><input type="checkbox" id="countdownToggle" checked><span class="sw-track"></span></label>
        </div>
      </div>

      <!-- Start -->
      <div class="start-wrap">
        <button class="start-btn" id="startBtn">Start Recording</button>
        <span class="badge-free">No time limit</span>
      </div>

    </div>

    <!-- ── COUNTDOWN ── -->
    <div id="countdown-view" class="hidden">
      <div class="cd-center">
        <div class="cd-ring"><span id="countdown-num">3</span></div>
        <p class="cd-text">Starting…</p>
        <button class="text-btn" id="cancelCountdownBtn">Cancel</button>
      </div>
    </div>

    <!-- ── RECORDING ── -->
    <div id="recording-view" class="hidden">
      <div class="rec-bar">
        <span class="rec-live"></span>
        <span class="rec-time" id="rec-timer">0:00</span>
        <span class="rec-badge" id="rec-mode-label">Screen</span>
      </div>
      <div class="rec-btns">
        <button class="rec-btn" id="pauseBtn">
          <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          Pause
        </button>
        <button class="rec-btn red" id="stopBtn">
          <svg viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
          Stop
        </button>
        <button class="rec-btn muted" id="cancelRecBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          Discard
        </button>
      </div>
    </div>

    <!-- Recents -->
    <div class="recents" id="recents-section">
      <div class="recents-hdr">
        <span>Recent</span>
        <span class="cnt" id="rec-count">0</span>
      </div>
      <div id="recordings-list" class="rec-list">
        <p class="empty">No recordings yet</p>
      </div>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>

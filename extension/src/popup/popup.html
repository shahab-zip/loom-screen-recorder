<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="popup">

    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="rec-icon">
          <div class="rec-icon-dot"></div>
        </div>
        <span class="header-title">START RECORDING</span>
      </div>
      <button class="close-btn" id="openAppBtn" title="Open full app">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6"/><polyline points="15,3 21,3 21,9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      </button>
    </div>

    <!-- IDLE VIEW -->
    <div id="idle-view">

      <!-- Mode cards -->
      <div class="mode-grid">
        <button class="mode-card selected" data-mode="screen">
          <div class="mode-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
          </div>
          <div class="mode-label">Screen Only</div>
          <div class="mode-desc">Record your screen</div>
          <div class="mode-check">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20,6 9,17 4,12"/></svg>
          </div>
        </button>
        <button class="mode-card" data-mode="screen-camera">
          <div class="mode-icon">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15.2 10.7l4-2.2a.8.8 0 011.3.7v5.6a.8.8 0 01-1.3.7l-4-2.2"/><rect x="3" y="6.5" width="12.5" height="11" rx="2"/></svg>
          </div>
          <div class="mode-label">Screen + Camera</div>
          <div class="mode-desc">With webcam bubble</div>
          <div class="mode-check">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20,6 9,17 4,12"/></svg>
          </div>
        </button>
      </div>

      <!-- Settings -->
      <div class="settings">
        <!-- Camera -->
        <div class="setting-row" id="cameraRow">
          <div class="setting-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15.2 10.7l4-2.2a.8.8 0 011.3.7v5.6a.8.8 0 01-1.3.7l-4-2.2"/><rect x="3" y="6.5" width="12.5" height="11" rx="2"/></svg>
          </div>
          <select id="cameraSelect" class="setting-select">
            <option value="">No Camera</option>
          </select>
          <button class="toggle off" id="cameraToggle" data-on="false">
            <div class="toggle-dot"></div>
          </button>
        </div>

        <!-- Mic -->
        <div class="setting-row">
          <div class="setting-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </div>
          <select id="micSelect" class="setting-select">
            <option value="">No Microphone</option>
          </select>
          <button class="toggle on" id="micToggle" data-on="true">
            <div class="toggle-dot"></div>
          </button>
        </div>

        <!-- Options -->
        <div class="options-bar">
          <div class="opt-item">
            <span class="opt-text">HD Quality</span>
            <button class="toggle sm on" id="hdToggle" data-on="true">
              <div class="toggle-dot"></div>
            </button>
          </div>
          <div class="opt-divider"></div>
          <div class="opt-item">
            <span class="opt-text">Countdown</span>
            <button class="toggle sm on" id="countdownToggle" data-on="true">
              <div class="toggle-dot"></div>
            </button>
          </div>
        </div>
      </div>

      <!-- Start button -->
      <div class="start-section">
        <button class="start-btn" id="startBtn">
          <div class="start-dot"></div>
          <span>Start Recording</span>
        </button>
      </div>

    </div>

    <!-- COUNTDOWN VIEW -->
    <div id="countdown-view" class="view-hidden">
      <div class="cd-wrap">
        <div class="cd-circle">
          <span id="countdown-num">3</span>
        </div>
        <p class="cd-label">Starting recording…</p>
        <button class="cancel-link" id="cancelCountdownBtn">Cancel</button>
      </div>
    </div>

    <!-- RECORDING VIEW -->
    <div id="recording-view" class="view-hidden">
      <div class="live-bar">
        <div class="live-dot"></div>
        <span class="live-time" id="rec-timer">0:00</span>
        <span class="live-badge" id="rec-mode-label">Screen</span>
      </div>
      <div class="live-actions">
        <button class="action-btn" id="pauseBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          <span>Pause</span>
        </button>
        <button class="action-btn primary" id="stopBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
          <span>Stop</span>
        </button>
        <button class="action-btn muted" id="cancelRecBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          <span>Discard</span>
        </button>
      </div>
    </div>

    <!-- RECENTS -->
    <div class="recents">
      <div class="recents-top">
        <span class="recents-label">Recent recordings</span>
        <span class="recents-count" id="rec-count">0</span>
      </div>
      <div id="recordings-list" class="recents-list">
        <div class="recents-empty">No recordings yet</div>
      </div>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>

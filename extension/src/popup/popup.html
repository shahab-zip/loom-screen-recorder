<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <div class="popup">

    <!-- Top nav -->
    <nav class="topnav">
      <button class="nav-icon" id="homeBtn" title="Home">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9,22 9,12 15,12 15,22"/></svg>
      </button>
      <button class="nav-icon active" id="videoBtn" data-mode="screen" title="Video">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
      </button>
      <button class="nav-icon" id="camBtn" data-mode="screen-camera" title="Camera">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 19a2 2 0 01-2 2H3a2 2 0 01-2-2V8a2 2 0 012-2h4l2-3h6l2 3h4a2 2 0 012 2z"/><circle cx="12" cy="13" r="4"/></svg>
      </button>
      <button class="nav-icon" id="closeBtn" title="Close">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </nav>

    <!-- IDLE VIEW -->
    <div id="idle-view" class="body-content">

      <!-- Capture target -->
      <button class="card capture-card" id="captureCard">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><circle cx="7" cy="6" r="0.8" fill="currentColor"/><circle cx="10" cy="6" r="0.8" fill="currentColor"/></svg>
        <span class="card-label">Window</span>
        <svg class="card-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6,9 12,15 18,9"/></svg>
      </button>

      <!-- Camera -->
      <div class="card device-card" id="cameraRow">
        <div class="device-left">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 10l5-3v10l-5-3"/><rect x="2" y="6" width="14" height="12" rx="2"/><line x1="7" y1="12" x2="7" y2="12.01" stroke-width="3" stroke-linecap="round"/></svg>
          <div class="device-info">
            <select id="cameraSelect" class="device-select">
              <option value="">No Camera</option>
            </select>
          </div>
        </div>
        <button class="pill-badge off" id="cameraToggle">Off</button>
      </div>

      <!-- Microphone -->
      <div class="card device-card">
        <div class="device-left">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          <div class="device-info">
            <select id="micSelect" class="device-select">
              <option value="">No Microphone</option>
            </select>
            <div class="audio-meter">
              <div class="audio-bar" id="audioBar"></div>
            </div>
          </div>
        </div>
        <button class="pill-badge on" id="micToggle">On</button>
      </div>

      <!-- Start button -->
      <button class="start-btn" id="startBtn">Start Recording</button>
      <p class="limit-text">No recording limit</p>

      <!-- Bottom toolbar -->
      <div class="bottom-bar">
        <button class="bar-item" id="countdownToggle" data-on="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>
          <span>Countdown</span>
          <span class="bar-dot on"></span>
        </button>
        <button class="bar-item" id="hdToggle" data-on="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><text x="12" y="15" text-anchor="middle" fill="currentColor" stroke="none" font-size="8" font-weight="800">HD</text></svg>
          <span>Quality</span>
          <span class="bar-dot on"></span>
        </button>
        <button class="bar-item" id="moreBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="19" cy="12" r="2"/></svg>
          <span>More</span>
        </button>
      </div>
    </div>

    <!-- COUNTDOWN VIEW -->
    <div id="countdown-view" class="body-content view-hidden">
      <div class="cd-wrap">
        <div class="cd-ring"><span id="countdown-num">3</span></div>
        <p class="cd-label">Recording starts in…</p>
        <button class="cd-cancel" id="cancelCountdownBtn">Cancel</button>
      </div>
    </div>

    <!-- RECORDING VIEW -->
    <div id="recording-view" class="body-content view-hidden">
      <div class="rec-header">
        <div class="rec-live-group">
          <div class="rec-dot"></div>
          <span class="rec-time" id="rec-timer">0:00</span>
        </div>
        <span class="rec-badge" id="rec-mode-label">Screen</span>
      </div>
      <div class="rec-actions">
        <button class="rec-action" id="pauseBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
          <span>Pause</span>
        </button>
        <button class="rec-action stop-action" id="stopBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
          <span>Stop</span>
        </button>
        <button class="rec-action discard-action" id="cancelRecBtn">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          <span>Discard</span>
        </button>
      </div>
    </div>

    <!-- RECENTS (hidden by default, shown when clicking Home) -->
    <div id="recents-view" class="body-content view-hidden">
      <div class="recents-hdr">
        <span>Recent Recordings</span>
        <span class="recents-cnt" id="rec-count">0</span>
      </div>
      <div id="recordings-list" class="recents-list">
        <div class="recents-empty">No recordings yet</div>
      </div>
      <button class="open-app-btn" id="openAppBtn2">Open full app →</button>
    </div>

  </div>
  <script src="popup.js"></script>
</body>
</html>
